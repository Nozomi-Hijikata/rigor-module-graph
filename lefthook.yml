# https://github.com/evilmartians/lefthook
#
# After bundling, wire the hooks into .git/hooks once:
#
#   bundle exec lefthook install
#
# Skip a hook ad-hoc with LEFTHOOK_EXCLUDE=<command_name>.

pre-commit:
  parallel: true
  commands:
    rubocop:
      tags: lint
      # Scan the whole project, not just staged files. CI runs the
      # same `bundle exec rubocop --parallel` so the local hook
      # catches the same violations CI would (e.g. an unstaged
      # Gemfile / Rakefile drift).
      run: bundle exec rubocop --parallel
      stage_fixed: true
    betterleaks:
      tags: security
      # `--staged` is the right scope for a secret scanner — only
      # content that's about to be committed can leak secrets into
      # the gem. A full-tree scan doesn't add safety, just latency.
      run: betterleaks git --pre-commit --redact --staged --verbose
    rigor:
      tags: lint
      # Full `lib/` scan. `.rigor.yml` already excludes test/ and
      # examples/ where SimpleCov / lefthook DSLs would trip the
      # analyzer's static lookup.
      run: bundle exec rigor check lib

    zizmor:
      tags: security
      # GitHub Actions security / lint. Only runs when a workflow
      # file is staged, so the day-to-day commit cost is zero.
      # Install once with `brew install zizmor` (macOS) or
      # `pipx install zizmor`; CI also runs it via the
      # `workflow-lint` job in .github/workflows/ci.yml.
      glob: ".github/workflows/*.{yml,yaml}"
      run: zizmor {staged_files}

pre-push:
  commands:
    minitest:
      tags: test
      run: bundle exec rake test
