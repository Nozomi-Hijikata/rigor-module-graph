name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# A single Pages deployment runs at a time; queue subsequent runs
# so two quick merges don't race on the same site.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: "4.0.0"
          bundler-cache: true

      - name: Generate RDoc
        # `rake rdoc` writes the darkfish HTML tree to ./doc per
        # the RDoc::Task in the Rakefile.
        run: bundle exec rake rdoc

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # `actions/deploy-pages` requires the `pages: write` and
    # `id-token: write` permissions and a `github-pages`
    # environment binding to publish.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
