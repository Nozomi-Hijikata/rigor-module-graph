name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs when a PR is force-pushed; only the
# latest commit's checks are interesting.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        # `bundler-cache: true` runs `bundle install` and writes
        # the lockfile-keyed restore cache so subsequent runs skip
        # the install entirely on a cache hit.
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: Run minitest
        run: bundle exec rake test

      - name: Run minitest with C2 coverage
        # SimpleCov runs when COVERAGE=1; report writes to
        # ./coverage. We upload it as a build artefact so failures
        # are inspectable from the run page.
        run: bundle exec rake coverage
        env:
          COVERAGE: "1"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version-file: ".ruby-version"
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel

      - name: Rigor check (lib only)
        # Same scope the pre-commit hook uses — keeps the analyzer
        # away from test_helper's SimpleCov DSL.
        run: bundle exec rigor check lib

  workflow-lint:
    # Audits the GitHub Actions workflows themselves. zizmor flags
    # the common Action security pitfalls (mutable refs, missing
    # persist-credentials, overbroad permissions, ...).
    runs-on: ubuntu-latest
    # zizmor-action internally calls `github/codeql-action/
    # upload-sarif` to surface findings in the repo's Security
    # tab. Without `security-events: write` that step fails with
    # "Resource not accessible by integration" and the whole job
    # exits non-zero even though zizmor itself reported no
    # findings.
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        # Pinned to a specific tag; zizmorcore/zizmor-action
        # doesn't publish a moving major tag.
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
