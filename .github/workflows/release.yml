name: Release

# Manual trigger only — we don't auto-publish on tag pushes
# because the workflow needs a human to confirm the version bump
# and changelog before bytes hit rubygems.org.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the `gem push` + GitHub Release steps (build + test only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  # OIDC trusted publishing to RubyGems. No long-lived API key —
  # rubygems.org accepts a short-lived token tied to this repo +
  # workflow. Configure the trusted publisher under the gem's
  # rubygems.org settings before the first run; see
  # https://guides.rubygems.org/trusted-publishing/
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: rubygems     # use a protected environment if branch protection is set
    permissions:
      contents: write           # gh release create
      id-token: write           # OIDC token for rubygems trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # `rubygems/release-gem` runs `rake release`, which
          # invokes `git push --tags`; needs the tag history
          # locally. `gh release create --verify-tag` also needs
          # the tag visible.
          fetch-depth: 0

      - name: Set up Ruby
        # No bundler-cache here: this workflow publishes a build
        # artefact, and a poisoned dependency in a restored cache
        # could end up in the gem we push. The install runs
        # once per release, which is cheap.
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: "4.0.0"

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Resolve version + verify CHANGELOG + tag
        id: meta
        # Three preflight checks for the three things that are
        # easy to forget and expensive to recover from after
        # `gem push`:
        # - CHANGELOG.md has a `## [X.Y.Z]` section
        # - `vX.Y.Z` tag exists locally (= was pushed)
        # - the tag points at the commit we're actually building
        #   (catches "tagged on an older commit but bumped VERSION
        #   later" mistakes)
        run: |
          set -euo pipefail
          version="$(ruby -r ./lib/rigor/module_graph/version -e 'print Rigor::ModuleGraph::VERSION')"
          tag="v${version}"

          if ! grep -qFx "## [${version}]" CHANGELOG.md \
              && ! grep -qE "^## \[${version}\] " CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no section for version ${version}."
            echo "Add a '## [${version}] — YYYY-MM-DD' heading before releasing."
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::Tag ${tag} does not exist."
            echo "Run \`git tag ${tag} && git push --tags\` before triggering this workflow."
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "${tag}")"
          head_commit="$(git rev-parse HEAD)"
          if [ "${tag_commit}" != "${head_commit}" ]; then
            echo "::error::Tag ${tag} points at ${tag_commit}, but this run builds ${head_commit}."
            echo "Move the tag (\`git tag -f ${tag}\`) or revert HEAD before releasing."
            exit 1
          fi

          echo "CHANGELOG, tag ${tag}, and HEAD all aligned at ${head_commit}."
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section for this version
        id: changelog
        # Slice between the `## [X.Y.Z]` heading and the next
        # `## [` heading (= next version or `[Unreleased]`).
        # `index() == 1` is a fixed-string prefix match — avoids
        # `.` in the version being interpreted as a regex
        # metacharacter. The body of the slice becomes the
        # GitHub Release notes.
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          notes_path="/tmp/release-notes.md"
          awk -v ver="${VERSION}" '
            index($0, "## [" ver "]") == 1 { flag=1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md > "${notes_path}"

          if ! grep -q '[^[:space:]]' "${notes_path}"; then
            echo "::error::Extracted release notes are empty (whitespace only)."
            echo "Check that CHANGELOG.md's [${VERSION}] section has content."
            exit 1
          fi
          echo "notes_path=${notes_path}" >> "$GITHUB_OUTPUT"
          echo "--- release notes preview ---"
          cat "${notes_path}"

      - name: Run tests
        run: bundle exec rake test

      - name: Build gem for inspection
        # Mirrors what `rake release` will build in the publish
        # step; surfaces gemspec / packaging errors before we
        # configure the OIDC token. Output filename matches
        # `Bundler::GemHelper`'s convention so the publish step
        # below produces the same artefact path.
        run: bundle exec rake build

      - name: Verify gem contents
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          gem unpack "pkg/rigor-module-graph-${VERSION}.gem" --target /tmp/gem-inspect
          ls /tmp/gem-inspect/

      - name: Upload built gem as artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gem
          path: pkg/*.gem
          retention-days: 7

      - name: Push to RubyGems (trusted publishing)
        if: ${{ !inputs.dry_run }}
        # Runs `rake release` under OIDC credentials. The action
        # leans on `Bundler::GemHelper`: build → guard_clean →
        # tag push (no-op when the tag is already on origin) →
        # `gem push`. We rely on Rakefile's
        # `require "bundler/gem_tasks"` for the task definitions.
        uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0

      - name: Create GitHub Release
        # Runs after the RubyGems push so a failed publish doesn't
        # leave a Release pointing at a non-existent gem version.
        # The reverse failure mode (publish OK, Release create
        # fails) requires manual recovery via
        # `gh release create vX.Y.Z` — accepted because the
        # action-side flake rate is low.
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          NOTES_PATH: ${{ steps.changelog.outputs.notes_path }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file "${NOTES_PATH}" \
            --verify-tag \
            "pkg/rigor-module-graph-${VERSION}.gem"
