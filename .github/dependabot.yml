version: 2
updates:
  # Ruby gems via Bundler. Dependabot opens PRs on minor /
  # patch bumps. The `cooldown` setting in `.bundle/config`
  # already gates against zero-day publish, so this layer is
  # additive: it surfaces version drift even when local
  # `bundle update` runs are infrequent.
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions. Bumps the SHA pins our zizmor policy
  # already enforces; the resulting PR includes the new tag in
  # the trailing comment so the diff is reviewable in one pass.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # `lib/**/templates/vendor/` is intentionally NOT covered by
  # any Dependabot ecosystem. Vendored third-party JS (e.g.
  # cytoscape.min.js) is upgraded by a manual PR that:
  #   - downloads the new release from two independent sources
  #   - cross-checks sha256 between them
  #   - updates `lib/.../templates/vendor/CHECKSUMS`
  #   - runs `rake vendor:verify`
  # The deliberate human-in-the-loop is the supply-chain
  # control documented in docs/plan.md. See the "Bumping a
  # vendored dependency" notes in
  # `lib/.../templates/vendor/CHECKSUMS`.
